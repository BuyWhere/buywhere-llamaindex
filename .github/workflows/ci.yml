name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - run: pip install -e ".[dev]" 2>/dev/null || pip install -e .
      - run: pip install pytest pytest-asyncio
      - run: python -m pytest tests/ -v

  mcp-health:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -e .
      - run: pip install pytest pytest-asyncio
      - run: python -m pytest tests/test_mcp_continuous.py -v --tb=short
        env:
          BUYWHERE_API_KEY: ${{ secrets.BUYWHERE_API_KEY }}

  mcp-continuous:
    runs-on: ubuntu-latest
    needs: mcp-health
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -e .
      - run: pip install pytest pytest-asyncio
      - run: python -m pytest tests/test_mcp_continuous.py -v --tb=short -k "continuous or concurrent"
        env:
          BUYWHERE_API_KEY: ${{ secrets.BUYWHERE_API_KEY }}
